function parseDateTime(data, hora) {
  const [d,m,y] = data.split('/');
  const [h,min] = hora.split(':');
  return new Date(+y, +m-1, +d, +h, +min);
}

function jogoFechado(jogo) {
  return new Date() >= parseDateTime(jogo.data, jogo.hora);
}

function calcPontos(bet, result, fase, brasil) {
  if (!result || result.g1 === undefined || result.g2 === undefined) return 0;
  const t = PTS[fase] || PTS.grupo;
  let pts = 0;

  if (!bet.especial) {
    // jogo normal: só vencedor
    const realW = result.g1 > result.g2 ? 'time1' : result.g1 < result.g2 ? 'time2' : 'empate';
    if (bet.winner === realW) pts = t.venc;
  } else {
    if (bet.g1 === undefined || bet.g2 === undefined) return 0;
    const realW = result.g1 > result.g2 ? 'time1' : result.g1 < result.g2 ? 'time2' : 'empate';
    const betW  = bet.g1  > bet.g2  ? 'time1' : bet.g1  < bet.g2  ? 'time2' : 'empate';
    if (realW !== betW) return 0;
    if (bet.g1 === result.g1 && bet.g2 === result.g2) pts = t.exato;
    else if ((result.g1 - result.g2) === (bet.g1 - bet.g2)) pts = t.diff;
    else if (bet.g1 === result.g1 || bet.g2 === result.g2) pts = t.gols1;
    else pts = t.venc;
  }
  return brasil ? pts * 2 : pts;
}

function calcPontosEspeciais(betsEsp, resultEsp) {
  if (!betsEsp || !resultEsp) return 0;
  let pts = 0;
  const {campeao, vice, semi1, semi2, artilheiro, brasil_fase} = betsEsp;
  const {campeao:rc, vice:rv, semi1:rs1, semi2:rs2, artilheiro:ra, brasil_fase:rb} = resultEsp;

  const finalistas = [rc, rv].filter(Boolean);
  const top4 = [rc, rv, rs1, rs2].filter(Boolean);

  const checkFinal = (bet, pos) => {
    if (!bet || !rc) return 0;
    if (pos === 'campeao' && bet === rc) return 20;
    if (pos === 'vice' && bet === rv) return 20;
    if (finalistas.includes(bet)) return 15;
    if (top4.includes(bet)) return 10;
    return 0;
  };
  const checkSemi = (bet) => {
    if (!bet) return 0;
    if (bet === rc || bet === rv) return 15; // finalista
    if (bet === rs1 || bet === rs2) return 20; // exato
    if (top4.includes(bet)) return 10;
    return 0;
  };

  pts += checkFinal(campeao, 'campeao');
  pts += checkFinal(vice, 'vice');
  pts += checkSemi(semi1);
  pts += checkSemi(semi2);
  if (ra && ra === artilheiro) pts += 15; // artilheiro — campo ra é o resultado
  if (rb && rb === brasil_fase) pts += 15;
  return pts;
}

async function autoSaveFavoritos() {
  if (!currentUser) return;
  const myBets = allBets[currentUser.uid] || {};
  const updates = {};
  JOGOS_GRUPOS.forEach(j => {
    if (jogoFechado(j)) return;
    const key = 'jogo_' + j.id;
    if (!myBets[key] || myBets[key].auto) {
      const prep = PREP_SCORES[j.id];
      if (!j.especial) {
        updates[key] = { winner: prep ? prep.winner : getFavorito(j.time1, j.time2), confirmed: false, especial: false, auto: true };
      } else if (prep) {
        updates[key] = { g1: prep.g1, g2: prep.g2, especial: true, confirmed: false, auto: true };
      }
    }
  });
  if (Object.keys(updates).length > 0) {
    await setDoc(doc(db, 'bets', currentUser.uid), updates, { merge: true });
  }
}

function renderJogoCard(jogo, fase) {
  const fechado = jogoFechado(jogo);
  const myBet = allBets[currentUser.uid]?.[`jogo_${jogo.id}`] || {};
  const result = allResults[`jogo_${jogo.id}`];
  const tags = [];
  if (jogo.brasil) tags.push('<span class="tag brasil">🇧🇷 Brasil 2×</span>');
  if (jogo.especial) tags.push('<span class="tag especial">⭐ especial</span>');
  else tags.push('<span class="tag normal">normal</span>');

  let betHtml = '';
  if (!jogo.especial) {
    const fav = getFavorito(jogo.time1, jogo.time2);
    const fav2 = getFavorito(jogo.time1, jogo.time2);
    const w = myBet.winner || fav2;
    const confirmed = myBet.confirmed || false;
    if (fechado) {
      betHtml = `<span class="bet-locked">${w==='time1'?jogo.time1:w==='time2'?jogo.time2:'Empate'}</span>`;
    } else {
      const cls1 = w==='time1' ? (confirmed?' sel':' prefilled') : '';
      const clsE = w==='empate' ? (confirmed?' sel':' prefilled') : '';
      const cls2 = w==='time2' ? (confirmed?' sel':' prefilled') : '';
      betHtml = `<div class="winner-btns">
        <button class="wbtn${cls1}" data-jid="${jogo.id}" data-w="time1">${jogo.time1.split(' ')[0]}</button>
        <button class="wbtn${clsE}" data-jid="${jogo.id}" data-w="empate">Emp</button>
        <button class="wbtn${cls2}" data-jid="${jogo.id}" data-w="time2">${jogo.time2.split(' ')[0]}</button>
      </div>`;
    }
  } else {
    if (fechado) {
      const g1 = myBet.g1 !== undefined ? myBet.g1 : '?';
      const g2 = myBet.g2 !== undefined ? myBet.g2 : '?';
      betHtml = `<span class="bet-locked">${g1} × ${g2}</span>`;
    } else {
      betHtml = `<div class="score-inp">
        <input type="number" min="0" max="20" class="ginp${isBR?' brasil-inp':''}" data-jid="${jogo.id}" data-g="g1" value="${myBet.g1!==undefined?myBet.g1:(PREP_SCORES[jogo.id]?PREP_SCORES[jogo.id].g1:'')}" style="${myBet.g1===undefined&&PREP_SCORES[jogo.id]?'color:#bbb;font-style:italic':''}">
        <span>×</span>
        <input type="number" min="0" max="20" class="ginp${isBR?' brasil-inp':''}" data-jid="${jogo.id}" data-g="g2" value="${myBet.g2!==undefined?myBet.g2:(PREP_SCORES[jogo.id]?PREP_SCORES[jogo.id].g2:'')}" style="${myBet.g2===undefined&&PREP_SCORES[jogo.id]?'color:#bbb;font-style:italic':''}">
      </div>`;
    }
  }

  let resultHtml = '';
  if (result && result.g1 !== undefined) {
    const pts = calcPontos(myBet, result, fase, jogo.brasil);
    resultHtml = `<div class="result-box">Resultado: ${result.g1}×${result.g2} <span class="pts-earned">+${pts}pts</span></div>`;
  }

  // Mostrar palpites de todos após fechamento
  let outrosPalpites = '';
  if (fechado) {
    const palpites = Object.entries(allBets)
      .map(([uid, bets]) => {
        const b = bets[`jogo_${jogo.id}`];
        const nome = allUsers[uid]?.nome || allUsers[uid]?.email || uid.slice(0,6);
        if (!b) return null;
        let pStr = '';
        if (!jogo.especial) pStr = b.winner==='time1'?jogo.time1:b.winner==='time2'?jogo.time2:'Empate';
        else if (b.g1!==undefined) pStr = `${b.g1}×${b.g2}`;
        return pStr ? `<span class="palpite-chip">${nome}: <b>${pStr}</b></span>` : null;
      }).filter(Boolean);
    if (palpites.length) outrosPalpites = `<div class="outros-palpites"><span class="outros-label">Palpites:</span> ${palpites.join('')}</div>`;
  }

  return `<div class="jogo-card${fechado?' fechado':''}">
    <div class="jogo-header">
      <span class="jogo-num">#${jogo.id}</span>
      <span class="jogo-dt">${jogo.data} ${jogo.hora} (Brasília)</span>
      <div class="jogo-tags">${tags.join('')}</div>
    </div>
    <div class="jogo-body">
      <div class="jogo-times">${jogo.time1} <span class="vs">×</span> ${jogo.time2}</div>
      <div class="jogo-bet">${betHtml}</div>
    </div>
    ${resultHtml}
    ${outrosPalpites}
  </div>`;
}

function renderMataMata() {
  const fasesMata = allResults['matamata_fases'];
  if (!fasesMata || !fasesMata.length) return '<p class="info-txt">Aguardando definição dos classificados após a fase de grupos.</p>';

    html += `<div class="grupo-label">${fase.nome}</div>`;
    fase.jogos.forEach(j => { html += renderJogoCard(j, fase.chave); });

  return html;

// ── ABA RANKING ──
function renderRanking() {
  const scores = Object.entries(allUsers).map(([uid, u]) => {
    let total = 0;
    const bets = allBets[uid] || {};
    JOGOS_GRUPOS.forEach(j => {
      const r = allResults[`jogo_${j.id}`];
      if (!r || r.g1 === undefined) return;
      const b = bets[`jogo_${j.id}`] || {};
      total += calcPontos(b, r, 'grupo', j.brasil);
    });
    const espR = allResults['especiais'];
    const espB = bets.especiais;
    if (espR && espB) total += calcPontosEspeciais(espB, espR);
    return { nome: u.nome || u.email, total, uid };
  }).sort((a,b) => b.total - a.total);

  if (!scores.length) return '<p class="info-txt">Nenhum participante ainda.</p>';

  const medals = ['🥇','🥈','🥉'];
  return `<div class="section-card">
    <h2>🏆 Ranking Geral</h2>
    <table class="rank-table">
      <thead><tr><th>#</th><th>Jogador</th><th>Pontos</th></tr></thead>
      <tbody>
        ${scores.map((s,i) => `<tr class="${s.uid===currentUser.uid?'minha-linha':''}">
          <td>${medals[i]||i+1}</td>
          <td>${s.nome}</td>
          <td><b>${s.total}</b></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

      <div class="esp-item"><label>Artilheiro</label><input id="re_artilheiro" value="${re.artilheiro||''}"></div>
      <div class="esp-item"><label>Fase Brasil</label><select id="re_brasil_fase">
        ${["1a fase","16-avos de final","Oitavas de final","Quartas de final","Semifinal","Chega à final"].map(f=>`<option${f===re.brasil_fase?' selected':''}>${f}</option>`).join('')}
      </select></div>
    </div>
    <button class="btn-save" onclick="salvarResultEspeciais()">Salvar resultados especiais</button>
  </div>`;

  html += `</div>`;
  return html;
}

// ── BIND EVENTS ──
function bindEvents() {
  document.getElementById('btnGoogle')?.addEventListener('click', loginGoogle);
  document.getElementById('btnLogin')?.addEventListener('click', loginEmail);
  document.getElementById('btnCadastrar')?.addEventListener('click', cadastrar);
  document.getElementById('btnSair')?.addEventListener('click', () => signOut(auth));
  document.getElementById('btnSalvarEsp')?.addEventListener('click', salvarEspeciais);

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      const tab = t.dataset.tab;
      const content = document.getElementById('tabContent');
      if (tab==='apostas') content.innerHTML = renderApostas();
      else if (tab==='ranking') content.innerHTML = renderRanking();
      else if (tab==='resultados') content.innerHTML = renderResultados();
      else if (tab==='admin') content.innerHTML = renderAdmin();
      bindInner();
    });
  });
  bindInner();
}

function bindInner() {
  document.querySelectorAll('.wbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const jid = +btn.dataset.jid;
      const w = btn.dataset.w;
      const jogo = JOGOS_GRUPOS.find(j=>j.id===jid);
      salvarJogoNormal(jid, w, jogo.brasil);
      btn.closest('.winner-btns').querySelectorAll('.wbtn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    });
  });

  // Auto-save especial via debounce
  document.querySelectorAll('.ginp[data-jid]').forEach(inp => {
    inp.addEventListener('input', () => {
      const jid = +inp.dataset.jid;
      clearTimeout(window._dt = window._dt || {});
      window._debounce = window._debounce || {};
      clearTimeout(window._debounce[jid]);
      window._debounce[jid] = setTimeout(() => {
        const g1inp = document.querySelector(`.ginp[data-jid="${jid}"][data-g="g1"]`);
        const g2inp = document.querySelector(`.ginp[data-jid="${jid}"][data-g="g2"]`);
        if (!g1inp || !g2inp) return;
        const g1 = parseInt(g1inp.value);
        const g2 = parseInt(g2inp.value);
        if (!isNaN(g1) && !isNaN(g2)) salvarJogoEspecial(jid, g1, g2);
      }, 900);
    });
  });

  document.querySelectorAll('.esp-sel').forEach(sel => {
    sel.addEventListener('change', () => {}); // handled on save
  });
}

// ── FIREBASE OPS ──
async function loginGoogle() {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    await ensureUserProfile(result.user);
  } catch(e) { showErr(e.message); }
}

async function loginEmail() {
  const email = document.getElementById('loginEmail').value;
  const pin   = document.getElementById('loginPin').value;
  try {
    await signInWithEmailAndPassword(auth, email, pin);
  } catch(e) { showErr('Email ou PIN inválido'); }
}

async function cadastrar() {
  const email = document.getElementById('loginEmail').value;
  const pin   = document.getElementById('loginPin').value;
  if (pin.length !== 6 || isNaN(+pin)) { showErr('PIN deve ter exatamente 4 números'); return; }
  try {
    const result = await createUserWithEmailAndPassword(auth, email, pin);
    const nome = prompt('Qual seu nome no bolão?') || email.split('@')[0];
    await ensureUserProfile(result.user, nome);
  } catch(e) { showErr('Erro: ' + e.message); }
}

async function ensureUserProfile(user, nomeOverride) {
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  const adminStatus = ADMINS.includes(user.email);
  if (!snap.exists()) {
    const nome = nomeOverride || user.displayName || user.email.split('@')[0];
    await setDoc(ref, { email: user.email, nome, isAdmin: adminStatus, createdAt: serverTimestamp() });
  } else if (adminStatus && !snap.data().isAdmin) {
    await updateDoc(ref, { isAdmin: true });
  }
}

async function salvarJogoNormal(jid, winner, brasil) {
  if (!currentUser) return;
  const ref = doc(db, 'bets', currentUser.uid);
  const snap = await getDoc(ref);
  const data = snap.exists() ? snap.data() : {};
  data[`jogo_${jid}`] = { winner, confirmed: true, especial: false, savedAt: new Date().toISOString() };
  await setDoc(ref, data, { merge: true });
}

async function salvarJogoEspecial(jid, g1, g2, brasil=false, fase='grupo') {
  if (!currentUser || isNaN(g1) || isNaN(g2)) return;
  const ref = doc(db, 'bets', currentUser.uid);
  const data = {};
  data[`jogo_${jid}`] = { g1, g2, especial: true, savedAt: new Date().toISOString() };
  await setDoc(ref, data, { merge: true });
  const btn = document.querySelector(`.save-jogo[data-jid="${jid}"]`);
  if (btn) { btn.textContent='✅'; setTimeout(()=>btn.textContent='💾',1500); }
}

async function salvarEspeciais() {
  if (!currentUser) return;
  const fields = ['campeao','vice','semi1','semi2','artilheiro','brasil_fase'];
  const esp = {};
  fields.forEach(f => { const el = document.querySelector(`[data-esp="${f}"]`); if(el) esp[f] = el.value; });
  await setDoc(doc(db,'bets',currentUser.uid), { especiais: esp }, { merge: true });
  const btn = document.getElementById('btnSalvarEsp');
  if (btn) { btn.textContent='✅ Salvo!'; setTimeout(()=>btn.textContent='Salvar apostas especiais',2000); }
}

async function salvarResultado(jid) {
  if (!isAdmin) return;
  const g1 = parseInt(document.getElementById(`adm_${jid}_g1`)?.value);
  const g2 = parseInt(document.getElementById(`adm_${jid}_g2`)?.value);
  if (isNaN(g1)||isNaN(g2)) { alert('Preencha os dois gols'); return; }
  await setDoc(doc(db,'results',`jogo_${jid}`), { g1, g2, updatedAt: serverTimestamp() }, { merge: true });
  alert(`Resultado jogo #${jid}: ${g1}×${g2} salvo!`);
}

async function salvarResultEspeciais() {
  if (!isAdmin) return;
  const data = {
    campeao: document.getElementById('re_campeao')?.value,
    vice: document.getElementById('re_vice')?.value,
    artilheiro: document.getElementById('re_artilheiro')?.value,
    brasil_fase: document.getElementById('re_brasil_fase')?.value,
    updatedAt: serverTimestamp()
  };
  await setDoc(doc(db,'results','especiais'), data, { merge: true });
  alert('Resultados especiais salvos!');
}

window.tornarAdmin = async (uid) => {
  if (!isAdmin) return;
  await updateDoc(doc(db,'users',uid), { isAdmin: true });
  alert('Usuário promovido a admin!');
};

window.salvarResultado = salvarResultado;

function showErr(msg) {
  const el = document.getElementById('loginErr');
  if (el) el.textContent = msg;
}

// ── AUTH STATE ──
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    // Carregar perfil
    const snap = await getDoc(doc(db,'users',user.uid));
    userProfile = snap.exists() ? snap.data() : {};
    isAdmin = ADMINS.includes(user.email) || userProfile?.isAdmin === true;

    autoSaveFavoritos().then(() => render());
    // Listener em tempo real para bets
    onSnapshot(collection(db,'bets'), snap => {
      allBets = {};
      snap.forEach(d => { allBets[d.id] = d.data(); });
    });

    // Listener em tempo real para results
    onSnapshot(collection(db,'results'), snap => {
      allResults = {};
      snap.forEach(d => { allResults[d.id] = d.data(); });
    });

    // Listener users
    onSnapshot(collection(db,'users'), snap => {
      allUsers = {};
      snap.forEach(d => { allUsers[d.id] = d.data(); });
      render();
    });
  } else {
    render();
  }
});

render();
</script>
